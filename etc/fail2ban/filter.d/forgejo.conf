# Fail2Ban filter for Forgejo authentication failures
#
# Matches login failures from Forgejo's log:
# 2026/03/11 13:48:36 ...ers/web/auth/auth.go:220:SignInPost() [W] Failed authentication attempt for user from 198.51.100.42:0: ...
#
# Test:
#   fail2ban-regex /var/log/forgejo/gitea.log /etc/fail2ban/filter.d/forgejo.conf

[Definition]

failregex = ^.+ Failed authentication attempt for .+ from <HOST>:\d+

ignoreregex =

datepattern = ^%%Y/%%m/%%d %%H:%%M:%%S