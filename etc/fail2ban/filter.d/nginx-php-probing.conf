# Blocks PHP/script scans that show up as "Primary script unknown" in the nginx error.log
[Definition]
failregex = ^.*FastCGI sent in stderr: "Primary script unknown".*client:\s*<HOST>,
            ^.*request:\s*"GET\s+/(?:xmlrpc\.php|wp-[^"]*|\.env\b[^"]*)[^"]*"\s+.*client:\s*<HOST>,
ignoreregex =
datepattern = ^%%Y/%%m/%%d %%H:%%M:%%S
