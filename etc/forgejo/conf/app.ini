; ==========================================================================
; Forgejo configuration — git.example.com
; Target: /etc/forgejo/conf/app.ini (chmod 0600, forgejo:forgejo)
; ==========================================================================
APP_NAME = Example Git
RUN_USER = forgejo
RUN_MODE = prod
WORK_PATH = /var/lib/forgejo

[server]
PROTOCOL = http
DOMAIN = git.example.com
ROOT_URL = https://git.example.com/
HTTP_ADDR = 127.0.0.1
HTTP_PORT = 3300
; SSH via Forgejo's own SSH server (port 2222, since 22=endlessh, 2424=sshd)
START_SSH_SERVER = true
SSH_DOMAIN = git.example.com
SSH_PORT = 2222
SSH_LISTEN_PORT = 2222
LFS_START_SERVER = true
OFFLINE_MODE = true
LFS_JWT_SECRET = <GENERATED_SECRET>

[database]
DB_TYPE = mysql
HOST = 127.0.0.1:3306
NAME = forgejo
USER = forgejo_usr
PASSWD = <DB_PASSWORD>
CHARSET = utf8mb4
LOG_SQL = false

[security]
INSTALL_LOCK = true
; forgejo-cli generate secret SECRET_KEY
SECRET_KEY =
; forgejo-cli generate secret INTERNAL_TOKEN
INTERNAL_TOKEN = <GENERATED_SECRET>
PASSWORD_HASH_ALGO = argon2
MIN_PASSWORD_LENGTH = 12
PASSWORD_COMPLEXITY = lower,upper,digit,spec
LOGIN_REMEMBER_DAYS = 7
DISABLE_GIT_HOOKS = true
DISABLE_WEBHOOKS = false
COOKIE_REMEMBER_NAME = forgejo_remember
COOKIE_USERNAME = forgejo_user

[service]
DISABLE_REGISTRATION = true
REQUIRE_SIGNIN_VIEW = false
ENABLE_NOTIFY_MAIL = true
DEFAULT_KEEP_EMAIL_PRIVATE = true
NO_REPLY_ADDRESS = noreply.git.example.com
DEFAULT_ALLOW_CREATE_ORGANIZATION = false
DEFAULT_ENABLE_TIMETRACKING = false

[mailer]
ENABLED = true
PROTOCOL = smtp+starttls
SMTP_ADDR = 127.0.0.1
SMTP_PORT = 587
FROM = "Forgejo" <git@example.com>
USER = git@example.com
; Fill in SMTP password
PASSWD =
FORCE_TRUST_SERVER_CERT = true

[repository]
ROOT = /var/lib/forgejo/repositories
DEFAULT_BRANCH = main
DEFAULT_PRIVATE = private
PREFERRED_LICENSES = MIT,Apache-2.0,GPL-3.0
DISABLE_STARS = true
DISABLE_FORKS = true
DEFAULT_REPO_UNITS = repo.code,repo.issues,repo.pulls
DISABLED_REPO_UNITS = repo.ext_wiki

[repository.pull-request]
DEFAULT_MERGE_STYLE = squash
WORK_IN_PROGRESS_PREFIXES = WIP:,[WIP],Draft:

[repository.signing]
SIGNING_KEY = default
SIGNING_NAME = Forgejo
SIGNING_EMAIL = admin@example.com

[lfs]
PATH = /var/lib/forgejo/data/lfs

[log]
MODE = file
LEVEL = warn
ROOT_PATH = /var/log/forgejo

[session]
PROVIDER = file
PROVIDER_CONFIG = /var/lib/forgejo/data/sessions
COOKIE_SECURE = true
COOKIE_NAME = forgejo_session

[picture]
AVATAR_UPLOAD_PATH = /var/lib/forgejo/data/avatars
REPOSITORY_AVATAR_UPLOAD_PATH = /var/lib/forgejo/data/repo-avatars
DISABLE_GRAVATAR = true

[attachment]
PATH = /var/lib/forgejo/data/attachments

[actions]
ENABLED = true

[oauth2]
; forgejo-cli generate secret JWT_SECRET
JWT_SECRET = <GENERATED_SECRET>

[cron.update_checker]
ENABLED = false

[other]
SHOW_FOOTER_VERSION = false
SHOW_FOOTER_TEMPLATE_LOAD_TIME = false