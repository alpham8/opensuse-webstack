user  nginx nginx;
worker_processes  4;

# load_module lib64/nginx/modules/ngx_http_fancyindex_module.so;
# load_module lib64/nginx/modules/ngx_http_geoip_module.so;
# load_module lib64/nginx/modules/ngx_http_headers_more_filter_module.so;
# load_module lib64/nginx/modules/ngx_http_image_filter_module.so;
# load_module lib64/nginx/modules/ngx_http_perl_module.so;
# load_module lib64/nginx/modules/ngx_http_xslt_filter_module.so;
# load_module lib64/nginx/modules/ngx_mail_module.so;
# load_module lib64/nginx/modules/ngx_rtmp_module.so;
# load_module lib64/nginx/modules/ngx_stream_geoip_module.so;
# load_module lib64/nginx/modules/ngx_stream_module.so;
load_module lib64/nginx/modules/ngx_http_brotli_filter_module.so;
load_module lib64/nginx/modules/ngx_http_brotli_static_module.so;

error_log  /var/log/nginx/error.log info;

#pid        /run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    # Hide server token (no nginx version in error messages)
    server_tokens off;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;
    keepalive_requests 1000;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=perip:10m rate=10r/s;

    # TLS hardening (global for all HTTPS vhosts)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # ssl_stapling on;  # disabled - wildcard cert has no OCSP responder URL
    # ssl_stapling_verify on;
    resolver 127.0.0.1 valid=300s;
    resolver_timeout 5s;

    # Open file cache (serve static files faster)
    open_file_cache max=2048 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors off;

    gzip  on;

    include conf.d/*.conf;

    # global overrides to provide a stable server with no oom kills:
    client_body_temp_path /var/lib/nginx/tmp;
    client_header_buffer_size 8k;
    client_body_buffer_size 128k;
    # max upload limit to 2 GB to refer php's settings:
    client_max_body_size 2G;
    large_client_header_buffers 4 16k;
    # Required as PHP-FPM does not support chunked transfer encoding and requires a valid ContentLength header.
    fastcgi_request_buffering on;
    fastcgi_buffering on;
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    fastcgi_busy_buffers_size 64k;
    fastcgi_max_temp_file_size 1024m;
    fastcgi_temp_path /var/lib/nginx/fcgi_tmp 1 2;

    # Timeouts for large file transfers (downloads via PHP-FPM)
    fastcgi_read_timeout 1800;
    fastcgi_send_timeout 1800;
    send_timeout 1800;

    log_format timed '$remote_addr - $host "$request" $status $body_bytes_sent '
                     'rt=$request_time urt=$upstream_response_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log timed;

    server {
        listen       80;
        server_name  localhost;

        # BEGIN BLOCK common brute-force blocking without further processing:
        limit_req zone=perip burst=20 nodelay;

        if ($request_method !~ ^(GET|POST|HEAD|PROPFIND|OPTIONS)$ ) {
            return 444;
        }

        location ~* /(ThinkPHP|invokefunction|shell_exec|StormStresser|bins/) {
            return 444;
        }
        # END BLOCK common brute-force blocking

        #charset koi8-r;

        #access_log  /var/log/nginx/host.access.log  main;

        location / {
            root   /srv/www/htdocs/;
            index  index.html index.htm;
        }

        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /srv/www/htdocs/;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
        #
        location ~ \.php$ {
            root           /srv/www/htdocs/;
            fastcgi_pass   unix:/run/php-fpm/www.sock;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
            include        fastcgi_params;
        }

        # deny access to .htaccess files, if Apache's document root
        # concurs with nginx's one
        #
        location ~ /\.ht {
            deny  all;
        }
    }


    # another virtual host using mix of IP-, name-, and port-based configuration
    #
    #server {
    #    listen       8000;
    #    listen       somename:8080;
    #    server_name  somename  alias  another.alias;

    #    location / {
    #        root   /srv/www/htdocs/;
    #        index  index.html index.htm;
    #    }
    #}


    # HTTPS server
    #
    #server {
    #    listen       443 ssl;
    #    server_name  localhost;

    #    ssl_certificate      cert.pem;
    #    ssl_certificate_key  cert.key;

    #    Allow TLS version 1.2 only, which is a recommended default these days
    #    by international information security standards.
    #    ssl_protocols        TLSv1.2;

    #    ssl_session_cache    shared:SSL:1m;
    #    ssl_session_timeout  5m;

    #    ssl_ciphers  HIGH:!aNULL:!MD5;
    #    ssl_prefer_server_ciphers  on;

    #    location / {
    #        root   /srv/www/htdocs/;
    #        index  index.html index.htm;
    #    }
    #}

    include vhosts.d/*.conf;
}
