; /etc/php8/fpm/php-fpm.d/nextcloud.conf
; Pool for Nextcloud
; Higher limits than standard pools due to large uploads and long sync operations
[nextcloud]
user = nginx
group = nginx

listen = /run/php-fpm/nextcloud.sock
listen.owner = nginx
listen.group = nginx
listen.mode = 0660

pm = dynamic
pm.max_children = 20
pm.start_servers = 3
pm.min_spare_servers = 3
pm.max_spare_servers = 8
pm.max_requests = 500

; Long timeout for large uploads/syncs (30 minutes)
request_terminate_timeout = 1800

; Environment isolation: clear_env removes all system env vars.
; Nextcloud needs at least PATH (admin check) and TMP paths.
clear_env = yes
env[HOSTNAME] = $HOSTNAME
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp

catch_workers_output = yes

security.limit_extensions = .php

; Nextcloud requires higher PHP limits
php_admin_value[memory_limit] = 1024M
php_admin_value[upload_max_filesize] = 16384M
php_admin_value[post_max_size] = 16384M
php_admin_value[max_execution_time] = 3600
php_admin_value[max_input_time] = 3600

; OPcache tuning for Nextcloud
php_admin_value[opcache.memory_consumption] = 256
php_admin_value[opcache.interned_strings_buffer] = 32
php_admin_value[opcache.max_accelerated_files] = 20000
php_admin_value[opcache.revalidate_freq] = 60
