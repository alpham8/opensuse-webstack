# See man rabbitmq-env.conf(5) for documentation

# Defaults to rabbit. This can be useful if you want to run more than one node
# per machine - RABBITMQ_NODENAME should be unique per erlang-node-and-machine
# combination. See the clustering on a single machine guide for details:
# http://www.rabbitmq.com/clustering.html#single-machine
#NODENAME=rabbit
#
# with the default SUSE epmd.socket we need to listen to localhost to
# properly activate the socket activation. In order to switch back to
# the clustering compatible listen to any address, run this prior removing
# this override:
#
# cat <<EOF > /etc/systemd/system/epmd.socket.d/ports.conf
# [Socket]
# ListenStream=
# ListenStream=[::]:4369
# EOF
# LEAP 16.0: Must be enabled! epmd only listens on 127.0.0.1 (SUSE
# epmd.socket), but the short hostname resolves to the external IP.
# Without this setting RabbitMQ fails with:
#   "epmd error for host example: address (cannot connect to host/port)"
NODENAME=rabbit@localhost

# By default RabbitMQ will bind to all interfaces, on IPv4 and IPv6 if
# available. Set this if you only want to bind to one network interface or#
# address family.
#NODE_IP_ADDRESS=127.0.0.1

# Defaults to 5672.
#NODE_PORT=5672

# Bind Erlang distribution to localhost only
NODE_IP_ADDRESS=127.0.0.1

# Optional: Pin distribution port (instead of range)
# (25672 is a typical default)
RABBITMQ_DIST_PORT=25672
# force in Erlang distribution IPv4 only:
RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS="-proto_dist inet_tcp -kernel inet_dist_listen_min 25672 inet_dist_listen_max 25672"
