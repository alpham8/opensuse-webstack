############################
# RabbitMQ – Host-only Setup
# openSUSE Leap 15.6
############################

############################
# AMQP localhost only (IPv4+IPv6)
############################
listeners.tcp.local    = 127.0.0.1:5672
listeners.tcp.local_v6 = ::1:5672

############################
# AMQPS localhost only (IPv4+IPv6)
############################
listeners.ssl.local    = 127.0.0.1:5671
listeners.ssl.local_v6 = ::1:5671

ssl_options.cacertfile = /etc/rabbitmq/ssl/fullchain.pem
ssl_options.certfile   = /etc/rabbitmq/ssl/fullchain.pem
ssl_options.keyfile    = /etc/rabbitmq/ssl/privkey.pem
ssl_options.verify = verify_none
ssl_options.fail_if_no_peer_cert = false

############################
# Management UI localhost only
############################
management.tcp.ip = 127.0.0.1
management.tcp.port = 15672

############################
# Resource limits
############################
vm_memory_high_watermark.relative = 0.4
disk_free_limit.relative = 1.5
